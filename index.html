<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SenLife | Premium Marketplace</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #e60000; /* Bir ton tünd qırmızı */
            --primary-soft: #fff1f1;
            --dark: #121212;
            --white: #ffffff;
            --light: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); color: var(--dark); padding-bottom: 90px; overflow-x: hidden; }

        /* Header */
        header { background: var(--white); position: sticky; top: 0; z-index: 1000; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
        .logo-img { height: 35px; object-fit: contain; }
        .red-divider { width: 1.5px; height: 20px; background: var(--primary); opacity: 0.5; }

        .search-area { padding: 0 16px; display: flex; align-items: center; gap: 10px; }
        .nav-icon-btn { background: var(--light); border: none; color: var(--dark); width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; position: relative; }
        
        .search-wrapper { background: var(--light); border: 1px solid #eee; border-radius: 14px; display: flex; align-items: center; padding: 0 15px; flex: 1; height: 42px; }
        .search-wrapper input { border: none; background: none; outline: none; width: 100%; padding-left: 10px; font-size: 14px; }

        /* Banner Style */
        .hero-swiper { margin: 15px; height: 200px; border-radius: 25px; overflow: hidden; }
        .banner-slide { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; }
        .banner-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); }
        .banner-label { position: relative; color: white; padding: 20px; font-size: 22px; font-weight: 800; z-index: 2; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 16px; }
        .card { background: white; border-radius: 22px; border: 1px solid #f0f0f0; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .card-img { width: 100%; height: 170px; object-fit: cover; }
        .card-body { padding: 12px; }
        .card-title { font-size: 13px; font-weight: 700; height: 36px; margin-bottom: 8px; }
        .card-price { color: var(--primary); font-weight: 800; font-size: 16px; margin-bottom: 12px; }

        /* Buttons */
        .btn-group { display: flex; gap: 8px; }
        .order-btn { flex: 1; background: #25D366; color: white; border: none; padding: 12px; border-radius: 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .cart-btn { width: 45px; background: var(--primary); color: white; border: none; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Premium Modal */
        .product-modal { position: fixed; inset: 0; background: white; z-index: 3000; display: none; overflow-y: auto; }
        .modal-top-nav { position: absolute; top: 20px; left: 0; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 10; }
        .modal-nav-btn { background: rgba(255,255,255,0.9); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--dark); font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .detail-swiper { width: 100%; height: 400px; }
        .detail-content { padding: 25px; }
        .detail-name { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .detail-price { font-size: 22px; color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        .detail-code { font-size: 14px; color: #888; margin-bottom: 15px; display: block; }
        .detail-note { background: #f9f9f9; padding: 15px; border-radius: 12px; font-size: 14px; color: #555; line-height: 1.6; }

        /* Category Grid */
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .cat-card { text-align: center; cursor: pointer; }
        .cat-icon { width: 100%; aspect-ratio: 1; background: var(--light); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--primary); margin-bottom: 8px; border: 1px solid #f0f0f0; }
        .cat-card p { font-size: 11px; font-weight: 700; color: #444; }

        /* Contact Section */
        .premium-about { border: 2px solid var(--primary); border-radius: 20px; padding: 25px; margin-bottom: 25px; text-align: center; }
        .premium-about h2 { color: var(--primary); margin-bottom: 10px; }
        .contact-link { display: flex; align-items: center; gap: 15px; padding: 18px; background: var(--light); border-radius: 15px; text-decoration: none; margin-bottom: 12px; color: var(--primary); font-weight: 700; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0 30px; border-top: 1px solid #eee; z-index: 2000; }
        .nav-link { text-decoration: none; color: #b0b0b0; text-align: center; font-size: 11px; font-weight: 600; position: relative; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--primary); }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: var(--primary); color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid white; }

        /* Toast */
        #custom-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--white); color: var(--primary); border: 2px solid var(--primary); padding: 12px 30px; border-radius: 15px; z-index: 5000; font-weight: 800; display: none; animation: fadeInOut 1.5s ease-in-out; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, -20px); } 15% { opacity: 1; transform: translate(-50%, 0); } 85% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -20px); } }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

    <div id="custom-toast">Səbətə əlavə etdiniz!</div>

    <div id="productModal" class="product-modal">
        <div class="modal-top-nav">
            <button class="modal-nav-btn" onclick="closeModal()"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="modal-nav-btn" onclick="shareProduct()"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <div class="swiper detail-swiper">
            <div class="swiper-wrapper" id="modal-slides"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="detail-content">
            <h1 id="det-title" class="detail-name"></h1>
            <div id="det-price" class="detail-price"></div>
            <span id="det-code" class="detail-code"></span>
            <div id="det-note" class="detail-note"></div>

            <div class="btn-group" style="margin-top: 30px; height: 55px;">
                <button id="det-order-btn" class="order-btn">Sifariş et</button>
                <button id="det-cart-btn" class="cart-btn"><i class="fa-solid fa-basket-shopping"></i></button>
            </div>
        </div>
    </div>

    <header>
        <div class="header-top">
            <img src="https://i.postimg.cc/5t87Yx8F/1774906530079.png" class="logo-img" />
            <div class="red-divider"></div>
            <img src="https://i.postimg.cc/Rq5QVZxB/1774906294188.png" class="logo-img" />
        </div>
        <div class="search-area">
            <button class="nav-icon-btn" onclick="goHome()"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass" style="color:#ccc;"></i>
                <input type="text" id="searchInput" placeholder="Axtarış..." onkeyup="filterProducts()" />
            </div>
            <button class="nav-icon-btn" style="color: #ff9800;"><i class="fa-solid fa-star"></i></button>
        </div>
    </header>

    <main id="app">
        <section id="home" class="view active">
            <div class="swiper hero-swiper">
                <div class="swiper-wrapper" id="banner-wrapper"></div>
            </div>
            <h2 id="list-title" style="padding: 10px 16px; font-size: 18px; font-weight: 800;">Yeni Məhsullar</h2>
            <div class="products-grid" id="product-list"></div>
        </section>

        <section id="catalog" class="view">
            <h2 style="padding: 25px 20px; font-size: 24px; font-weight: 800; color: var(--primary);">Kateqoriyalar</h2>
            <div class="cat-grid" id="category-list"></div>
        </section>

        <section id="cart" class="view">
            <div style="padding: 20px;">
                <h2 style="margin-bottom:20px; color: var(--primary);">Səbətim</h2>
                <div id="cart-items"></div>
                <div id="cart-summary" style="margin-top:20px; background: var(--light); padding: 25px; border-radius: 20px; display:none;">
                    <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom: 20px;">
                        <span>Cəmi:</span> <span id="total-price">0 AZN</span>
                    </div>
                    <button onclick="orderCartWhatsApp()" class="order-btn" style="width:100%; padding:18px;">Sifarişi Tamamla</button>
                </div>
            </div>
        </section>

        <section id="contact" class="view">
            <div style="padding: 20px;">
                <div class="premium-about">
                    <h2>SenLife</h2>
                    <p style="font-size: 14px; color: #555; line-height: 1.6;">Zövqlə seçilmiş premium əl işləri və hədiyyələr dünyası. Keyfiyyət və zərifliyin tək ünvanı.</p>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <a href="https://wa.me/994773526665" class="contact-link"><i class="fa-brands fa-whatsapp" style="font-size: 24px;"></i> WhatsApp dəstək</a>
                    <a href="https://www.instagram.com/senlife.az" class="contact-link"><i class="fa-brands fa-instagram" style="font-size: 24px;"></i> senlife.az</a>
                    <a href="mailto:senzgroups@gmail.com" class="contact-link"><i class="fa-solid fa-envelope" style="font-size: 24px;"></i> senzgroups@gmail.com</a>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="showView('home', this)"><i class="fa-solid fa-house"></i><span>Əsas</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('catalog', this)"><i class="fa-solid fa-layer-group"></i><span>Kateqoriya</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('cart', this)">
            <i class="fa-solid fa-basket-shopping"></i>
            <span>Səbət</span>
            <div id="cart-count-badge" class="cart-badge" style="display: none;">0</div>
        </a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('contact', this)"><i class="fa-solid fa-headset"></i><span>Əlaqə</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const products = [
            { id: 1, code: 'SL-001', name: 'Premium Gips Qabı', price: 15.00, cat: 'Gips məhsulları', img: ['https://picsum.photos/800/800?1'], status: 'Hazırdır', desc: 'Əllə hazırlanmış xüsusi dizayn.' },
            { id: 2, code: 'SL-002', name: 'Aromatik Şam', price: 22.00, cat: 'Şamlar', img: ['https://picsum.photos/800/800?2'], status: 'Hazırdır', desc: 'Təbii soya mumundan şam.' }
        ];

        const banners = [
            { label: 'Əl işləri', img: 'https://picsum.photos/800/400?10' },
            { label: 'Premium məhsullar', img: 'https://picsum.photos/800/400?11' },
            { label: 'Endirimlər', img: 'https://picsum.photos/800/400?12' },
            { label: 'Aksiyalar', img: 'https://picsum.photos/800/400?13' },
            { label: 'Bonuslar', img: 'https://picsum.photos/800/400?14' }
        ];

        const categories = [
            { name: 'Ev əşyaları', icon: 'fa-couch' }, { name: 'Geyimlər', icon: 'fa-shirt' },
            { name: 'Aksessuarlar', icon: 'fa-gem' }, { name: 'Gips məhsulları', icon: 'fa-cube' },
            { name: 'Hədiyyəlik qutular', icon: 'fa-gift' }, { name: 'Şokolad qutuları', icon: 'fa-box-open' },
            { name: 'Şamlar', icon: 'fa-fire' }, { name: 'Keramika əşyalar', icon: 'fa-wine-glass' },
            { name: 'Ətirlər', icon: 'fa-spray-can' }, { name: 'Portretlər', icon: 'fa-image' },
            { name: 'Oyuncaq aləmi', icon: 'fa-robot' }, { name: 'Digər', icon: 'fa-ellipsis' }
        ];

        let cart = [];

        function init() {
            renderProducts(products);
            renderCategories();
            renderBanners();
        }

        function renderBanners() {
            document.getElementById('banner-wrapper').innerHTML = banners.map(b => `
                <div class="swiper-slide">
                    <div class="banner-slide" style="background-image:url('${b.img}')">
                        <div class="banner-overlay"></div>
                        <div class="banner-label">${b.label}</div>
                    </div>
                </div>
            `).join('');
            
            new Swiper('.hero-swiper', {
                loop: true,
                autoplay: { delay: 1500, disableOnInteraction: false },
                speed: 1000
            });
        }

        function renderProducts(data) {
            document.getElementById('product-list').innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.img[0]}" class="card-img" onclick="openProduct(${p.id})" />
                    <div class="card-body">
                        <div class="card-title">${p.name}</div>
                        <div class="card-price">${p.price.toFixed(2)} AZN</div>
                        <div class="btn-group">
                            <button class="order-btn" onclick="orderSingle('${p.code}', '${p.name}')">Sifariş</button>
                            <button class="cart-btn" onclick="addToCart(${p.id})"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('det-title').innerText = p.name;
            document.getElementById('det-price').innerText = p.price.toFixed(2) + " AZN";
            document.getElementById('det-code').innerText = "Kod: " + p.code;
            document.getElementById('det-note').innerText = p.desc;
            document.getElementById('det-order-btn').onclick = () => orderSingle(p.code, p.name);
            document.getElementById('det-cart-btn').onclick = () => addToCart(p.id);

            const slides = p.img.map(img => `<div class="swiper-slide"><img src="${img}" style="width:100%; height:100%; object-fit:cover;"></div>`).join('');
            document.getElementById('modal-slides').innerHTML = slides;
            
            document.getElementById('productModal').style.display = 'block';
            new Swiper('.detail-swiper', { pagination: { el: '.swiper-pagination' }, autoplay: { delay: 1500 } });
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        function addToCart(id) {
            cart.push(products.find(x => x.id === id));
            updateCartBadge();
            const toast = document.getElementById('custom-toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }

        function updateCartBadge() {
            const badge = document.getElementById('cart-count-badge');
            badge.innerText = cart.length;
            badge.style.display = cart.length > 0 ? 'flex' : 'none';
        }

        function orderSingle(code, name) {
            const text = `Salam, SenLife! 👋\nBu məhsulu sifariş vermək istəyirəm:\n✨ Məhsul: ${name}\n🔢 Kod: ${code}`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(text)}`);
        }

        function renderCategories() {
            document.getElementById('category-list').innerHTML = categories.map(c => `
                <div class="cat-card" onclick="filterByCat('${c.name}')">
                    <div class="cat-icon"><i class="fa-solid ${c.icon}"></i></div>
                    <p>${c.name}</p>
                </div>
            `).join('');
        }

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el.tagName === 'A') el.classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() { 
            renderProducts(products); 
            showView('home', document.querySelector('.nav-link:first-child')); 
        }

        init();
    </script>
</body>
</html>
