                            <h3 class="card-title">${randomName} #${i}</h3>
                            <p class="card-price">${randomPrice} AZN</p>
                            <button class="order-btn" onclick="alert('Sifariş bölməsinə keçid edilir...')">Sifariş Et</button>
                        </div>
                    </div>
                `;
                // DOM-u yormamaq üçün ilk 30-u dərhal göstəririk, qalanı scroll edildikcə yüklənə bilər
                if(i == 970) break;
            }
            productsList.innerHTML = html;
        }

        loadProducts();
    </script>
</body>
</html>
