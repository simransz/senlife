<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SenLife</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">

<style>
:root{
--primary:#ff5a5a;
--soft:#fff4f4;
--dark:#121212;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#fff;color:#121212;padding-bottom:90px}

/* HEADER */
header{
background:#fff;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #eee;
padding:10px;
}

.search-area{
display:flex;
gap:10px;
align-items:center;
}

.icon-btn{
width:40px;height:40px;border:none;
background:var(--soft);
border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:var(--primary);
}

.search{
flex:1;
background:#f5f5f5;
border-radius:50px;
padding:10px 15px;
display:flex;
align-items:center;
}

.search input{
border:none;background:none;outline:none;width:100%;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
border:1px solid #eee;
border-radius:18px;
overflow:hidden;
background:#fff;
}

.card img{width:100%;height:160px;object-fit:cover}

.card-body{padding:10px}

.price{color:var(--primary);font-weight:800}

/* VIEW */
.view{display:none}
.view.active{display:block}

/* DETAIL */
.detail-img{width:100%}
.detail-box{padding:20px}

.sticky{
position:fixed;
bottom:70px;
left:0;
width:100%;
padding:10px;
}

.sticky button{
width:100%;
padding:15px;
border:none;
background:#25D366;
color:#fff;
border-radius:12px;
font-weight:700;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#fff;
border-top:1px solid #eee;
padding:10px;
}
</style>
</head>

<body>

<header>
<div class="search-area">

<button class="icon-btn" onclick="goHome()">
<i class="fa fa-arrow-left"></i>
</button>

<div class="search">
<input id="searchInput" placeholder="Məhsul axtar..." onkeyup="filter()">
</div>

<button class="icon-btn">
<i class="fa fa-gift"></i>
</button>

</div>
</header>

<!-- HOME -->
<section id="home" class="view active">
<div class="products" id="product-list"></div>
</section>

<!-- DETAIL -->
<section id="detail" class="view">
<div id="detail-content"></div>
</section>

<!-- CART -->
<section id="cart" class="view">
<div id="cart-items" style="padding:20px"></div>
<button onclick="orderCart()" style="margin:20px;width:90%">Sifariş et</button>
</section>

<!-- CONTACT -->
<section id="contact" class="view" style="padding:20px">
<a href="https://www.instagram.com/senlife.az?igsh=eDU4d3N6ZjQ2aGJm">Instagram</a>
</section>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Əsas</button>
<button onclick="show('cart')">Səbət</button>
<button onclick="show('contact')">Profil</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

<script>

const products=[
{ id:1, code:'SN001', name:'Gips Qutu', price:12, cat:'Gips', img:'https://picsum.photos/400?1', desc:'Minimalist dizayn' },
{ id:2, code:'SN002', name:'Şam', price:18, cat:'Şam', img:'https://picsum.photos/400?2', desc:'Ətirli şam' }
];

let cart=[];

/* HOME */
function render(){
product-list.innerHTML=products.map(p=>`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}">
<div class="card-body">
<b>${p.name}</b>
<div class="price">${p.price} AZN</div>
</div>
</div>
`).join('');
}

/* DETAIL */
function openProduct(id){
let p=products.find(x=>x.id==id);

detail-content.innerHTML=`
<div class="swiper">
<div class="swiper-wrapper">
<div class="swiper-slide"><img src="${p.img}" class="detail-img"></div>
<div class="swiper-slide"><img src="${p.img}" class="detail-img"></div>
</div>
</div>

<div class="detail-box">
<h2>${p.name}</h2>
<p><b>Qiymət:</b> ${p.price} AZN</p>
<p><b>Kateqoriya:</b> ${p.cat}</p>
<p><b>Kod:</b> ${p.code}</p>
<p>${p.desc}</p>

<button onclick="addCart(${p.id})">Səbətə əlavə et</button>
<button onclick="orderSingle(${p.id})">WhatsApp</button>
</div>

<div class="sticky">
<button onclick="orderSingle(${p.id})">Sifariş et</button>
</div>
`;

show('detail');

new Swiper('.swiper',{loop:true,autoplay:{delay:2500}});
}

/* CART */
function addCart(id){
cart.push(products.find(p=>p.id==id));
alert("Səbətə əlavə edildi");
}

function renderCart(){
cart-items.innerHTML=cart.map(p=>`
<div>${p.name} - ${p.price} AZN</div>
`).join('');
}

/* WHATSAPP */
function orderSingle(id){
let p=products.find(x=>x.id==id);

let msg=`Salam 😊

${p.name} sifariş etmək istəyirəm
Qiymət: ${p.price} AZN
Kod: ${p.code}`;

window.open("https://wa.me/994773526665?text="+encodeURIComponent(msg));
}

function orderCart(){
let msg="Salam 😊\n\nSəbət:\n";
cart.forEach(p=>msg+=`${p.name} - ${p.price} AZN\n`);
window.open("https://wa.me/994773526665?text="+encodeURIComponent(msg));
}

/* SEARCH */
function filter(){
let val=searchInput.value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
product-list.innerHTML=filtered.map(p=>`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}">
<div class="card-body">
<b>${p.name}</b>
<div class="price">${p.price} AZN</div>
</div>
</div>
`).join('');
}

/* NAV */
function show(v){
document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
document.getElementById(v).classList.add('active');
renderCart();
}

function goHome(){show('home')}

render();

</script>

</body>
</html>
