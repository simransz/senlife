<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SenLife | Professional Marketplace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #cc0000; /* Qırmızı */
            --dark: #121212;
            --bg: #ffffff;
            --white: #ffffff;
            --gray: #8e8e93;
            --light-gray: #f9f9f9;
            --radius: 12px;
            --shadow: 0 4px 15px rgba(204, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--dark); padding-bottom: 90px; }

        /* Header & Search */
        header {
            background: white; position: sticky; top: 0; z-index: 1000;
            padding: 10px 0; border-bottom: 2px solid var(--primary);
        }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .logo-img { height: 45px; }
        .red-divider { width: 2px; height: 30px; background-color: var(--primary); }
        
        .search-area { padding: 0 16px; }
        .search-wrapper {
            background: var(--light-gray); border: 1px solid #eee;
            border-radius: 50px; display: flex; align-items: center; padding: 8px 15px;
        }
        .search-wrapper input { border: none; background: none; outline: none; width: 100%; padding-left: 10px; }

        /* Banner */
        .hero-swiper { margin: 15px 0; height: 180px; }
        .banner-slide {
            width: 100%; height: 100%; border-radius: var(--radius);
            background-size: cover; background-position: center; position: relative;
        }
        .banner-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(transparent, rgba(204, 0, 0, 0.6)); 
            border-radius: var(--radius);
        }
        .banner-title { position: absolute; bottom: 15px; left: 15px; color: white; font-weight: 700; }

        /* Products */
        .section-label { padding: 15px 16px; font-weight: 700; color: var(--primary); }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px; }
        .card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #f0f0f0; box-shadow: var(--shadow); position: relative; }
        .card-img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 10px; }
        .card-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; height: 34px; overflow: hidden; }
        .card-price { color: var(--primary); font-weight: 700; font-size: 14px; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 5px; }
        .order-btn { flex: 3; background: #25D366; color: white; border: none; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .cart-btn { flex: 1; background: var(--primary); color: white; border: none; border-radius: 8px; }

        /* Categories */
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; }
        .cat-item { 
            text-align: center; background: white; padding: 15px 5px; border-radius: 12px; 
            border: 1px solid #f0f0f0; transition: 0.3s;
        }
        .cat-item:active { background: #fff5f5; border-color: var(--primary); }
        .cat-item i { font-size: 24px; color: var(--primary); margin-bottom: 8px; }
        .cat-item p { font-size: 11px; font-weight: 600; }

        /* Toast Notification */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 25px;
            border-radius: 50px; z-index: 2000; display: none; font-size: 14px; font-weight: 600;
        }

        /* Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 10px 0 20px;
            border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-link { text-decoration: none; color: #8e8e93; text-align: center; font-size: 10px; position: relative; }
        .nav-link.active { color: var(--primary); }
        .cart-count { position: absolute; top: -5px; right: 2px; background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        .view { display: none; }
        .view.active { display: block; }
        
        /* Contact Banner */
        .about-banner { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin: 16px; }
    </style>
</head>
<body>

    <div id="toast">Məhsul səbətə əlavə olundu!</div>

    <header>
        <div class="header-top">
            <img src="https://i.postimg.cc/5t87Yx8F/1774906530079.png" class="logo-img">
            <div class="red-divider"></div>
            <img src="https://i.postimg.cc/Rq5QVZxB/1774906294188.png" class="logo-img">
        </div>
        <div class="search-area">
            <div class="search-wrapper">
                <i class="fa fa-search" style="color: var(--primary);"></i>
                <input type="text" id="searchInput" placeholder="Məhsul adı və ya kodla axtar..." onkeyup="filterProducts()">
            </div>
        </div>
    </header>

    <main id="app">
        <section id="home" class="view active">
            <div class="swiper hero-swiper">
                <div class="swiper-wrapper" id="banner-wrapper"></div>
            </div>
            <h2 class="section-label">Yeni Məhsullar</h2>
            <div class="products-grid" id="product-list"></div>
        </section>

        <section id="catalog" class="view">
            <div class="cat-grid" id="category-list"></div>
        </section>

        <section id="cart" class="view">
            <div style="padding: 20px;">
                <h2 style="margin-bottom:15px; color: var(--primary);">Səbətiniz</h2>
                <div id="cart-items"></div>
                <div id="cart-summary" style="margin-top:20px; border-top: 1px solid #eee; padding-top:15px; display:none;">
                    <div style="display:flex; justify-content:space-between; font-weight:700; margin-bottom:15px;">
                        <span>Cəmi:</span> <span id="total-price">0 AZN</span>
                    </div>
                    <button onclick="orderCartWhatsApp()" class="order-btn" style="width:100%; padding:15px; font-size:14px;">Səbəti Sifariş Et</button>
                </div>
            </div>
        </section>

        <section id="contact" class="view">
            <div class="about-banner">
                <h3 style="margin-bottom:10px;">SenLife Professional Marketplace</h3>
                <p style="font-size: 13px; opacity: 0.9;">Keyfiyyət və zərifliyin tək ünvanı. Səmimi xidmət, rəsmi zəmanət.</p>
            </div>
            <div style="padding: 16px; display: flex; flex-direction: column; gap: 10px;">
                <a href="https://wa.me/994773526665" style="display:flex; align-items:center; gap:15px; padding:15px; background:#f9f9f9; border-radius:12px; text-decoration:none; color:black;">
                    <i class="fab fa-whatsapp" style="color:#25D366; font-size:20px;"></i> 077 352 66 65
                </a>
                <a href="https://www.instagram.com/senlife.az" style="display:flex; align-items:center; gap:15px; padding:15px; background:#f9f9f9; border-radius:12px; text-decoration:none; color:black;">
                    <i class="fab fa-instagram" style="color:#E1306C; font-size:20px;"></i> senlife.az
                </a>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active" onclick="showView('home', this)"><i class="fa fa-house"></i><p>Əsas</p></a>
        <a href="#" class="nav-link" onclick="showView('catalog', this)"><i class="fa fa-th-large"></i><p>Kataloq</p></a>
        <a href="#" class="nav-link" onclick="showView('cart', this)">
            <i class="fa fa-shopping-cart"></i><p>Səbət</p>
            <span class="cart-count" id="count">0</span>
        </a>
        <a href="#" class="nav-link" onclick="showView('contact', this)"><i class="fa fa-info-circle"></i><p>Əlaqə</p></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        // MƏHSUL DATA (Bura Telegram-dan gələn məlumatlar əsasında dolacaq)
        const products = [
            { id: 1, code: 'SN008', name: 'Kristal Qaşlı Əl İşi', price: 35.00, cat: 'Bujiteriya', img: 'https://picsum.photos/400/400?1' },
            { id: 2, code: 'SN009', name: 'Zərif Şam Dəsti', price: 15.50, cat: 'Şamlar', img: 'https://picsum.photos/400/400?2' }
        ];

        const categories = [
            { name: 'Bujiteriya', icon: 'fa-gem' },
            { name: 'Şamlar', icon: 'fa-fire' },
            { name: 'Şokolad qutuları', icon: 'fa-box' },
            { name: 'Gips dizayn', icon: 'fa-monument' },
            { name: 'Keramika işlər', icon: 'fa-wine-glass' },
            { name: 'Ətirlər', icon: 'fa-spray-can' },
            { name: 'Saatlar', icon: 'fa-clock' },
            { name: 'Portretlər', icon: 'fa-id-badge' },
            { name: 'Toxunma işlər', icon: 'fa-scroll' },
            { name: 'Buketlər', icon: 'fa-leaf' },
            { name: 'Oyuncaq aləmi', icon: 'fa-bear-face' },
            { name: 'Dekorlar', icon: 'fa-couch' }
        ];

        let cart = [];

        function init() {
            renderProducts(products);
            renderCategories();
            renderBanners();
            updateCartUI();
        }

        function renderBanners() {
            const wrapper = document.getElementById('banner-wrapper');
            const imgs = ["https://picsum.photos/600/300?1", "https://picsum.photos/600/300?2"];
            wrapper.innerHTML = imgs.map(img => `
                <div class="swiper-slide">
                    <div class="banner-slide" style="background-image:url('${img}')">
                        <div class="banner-overlay"></div>
                    </div>
                </div>
            `).join('');
            
            new Swiper('.hero-swiper', {
                loop: true, autoplay: { delay: 1500 }, speed: 800
            });
        }

        function renderProducts(data) {
            const list = document.getElementById('product-list');
            list.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.img}" class="card-img">
                    <div class="card-body">
                        <div style="font-size:10px; color:gray">Kod: ${p.code}</div>
                        <div class="card-title">${p.name}</div>
                        <div class="card-price">${p.price.toFixed(2)} AZN</div>
                        <div class="btn-group">
                            <button class="order-btn" onclick="orderSingle('${p.code}', '${p.name}', '${p.price}')">Sifariş</button>
                            <button class="cart-btn" onclick="addToCart(${p.id})"><i class="fa fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const list = document.getElementById('category-list');
            list.innerHTML = categories.map(c => `
                <div class="cat-item" onclick="filterByCat('${c.name}')">
                    <i class="fa-solid ${c.icon}"></i>
                    <p>${c.name}</p>
                </div>
            `).join('');
        }

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'cart') renderCartItems();
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
            
            // Xüsusi Toast Bildirişi
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function updateCartUI() {
            document.getElementById('count').innerText = cart.length;
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');
            if(cart.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:gray;'>Səbətiniz boşdur.</p>";
                summary.style.display = 'none';
                return;
            }
            summary.style.display = 'block';
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
                        <img src="${item.img}" style="width:50px; border-radius:8px;">
                        <div style="flex:1">
                            <div style="font-size:12px; font-weight:600;">${item.name}</div>
                            <div style="color:var(--primary); font-size:12px;">${item.price} AZN</div>
                        </div>
                        <i class="fa fa-trash" onclick="removeItem(${index})" style="color:gray;"></i>
                    </div>
                `;
            }).join('');
            document.getElementById('total-price').innerText = total.toFixed(2) + " AZN";
        }

        function removeItem(index) {
            cart.splice(index, 1);
            renderCartItems();
            updateCartUI();
        }

        // WhatsApp Sifariş
        function orderSingle(code, name, price) {
            const text = `Salam SenLife! 👋\nBu məhsulu sifariş vermək istəyirəm:\n🆔 Kod: ${code}\n📦 Ad: ${name}\n💰 Qiymət: ${price} AZN\nZəhmət olmasa, çatdırılma barədə məlumat verərdiniz.`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(text)}`);
        }

        function orderCartWhatsApp() {
            let itemsText = cart.map(p => `• ${p.name} (Kod: ${p.code}) — ${p.price.toFixed(2)} AZN`).join('\n');
            let total = cart.reduce((a, b) => a + b.price, 0).toFixed(2);
            const text = `Salam SenLife! 👋\nSəbətimdəki məhsulları sifariş vermək istəyirəm:\n${itemsText}\n\n💰 Cəmi məbləğ: ${total} AZN\nZəhmət olmasa, sifarişi təsdiqləyib çatdırılma barədə məlumat verərdiniz.`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(text)}`);
        }

        function filterProducts() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(val) || p.code.toLowerCase().includes(val));
            renderProducts(filtered);
        }

        function filterByCat(catName) {
            const filtered = products.filter(p => p.cat === catName);
            renderProducts(filtered);
            showView('home', document.querySelector('.nav-link:first-child'));
        }

        init();
    </script>
</body>
</html>
