<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SenLife | Professional Marketplace</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #e63946; /* Bir az daha yumşaq qırmızı */
            --primary-soft: #fdf1f2;
            --dark: #1d3557;
            --white: #ffffff;
            --light: #f8f9fa;
            --radius: 20px;
            --shadow-soft: 0 8px 24px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); color: var(--dark); padding-bottom: 100px; overflow-x: hidden; }

        /* Header & Search */
        header {
            background: var(--white); /* Tam ağ fon */
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
            border-bottom: 2px solid var(--primary);
        }

        .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
        .logo-img { height: 38px; object-fit: contain; }

        .search-area { padding: 0 16px; display: flex; align-items: center; gap: 12px; }
        
        /* Geri butonu həmişə görünür */
        .header-btn { 
            background: var(--primary-soft); 
            border: none; 
            color: var(--primary); 
            width: 40px; 
            height: 40px; 
            border-radius: 12px; 
            display: flex;
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .search-wrapper {
            background: var(--light);
            border: 1px solid #eee;
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            flex: 1;
        }

        .search-wrapper input { border: none; background: none; outline: none; width: 100%; padding-left: 8px; font-size: 14px; }

        /* Swiper / Banners */
        .hero-swiper { margin: 15px 16px; height: 180px; border-radius: 20px; overflow: hidden; }
        .banner-slide { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.5), transparent); }

        /* Grid Layouts */
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; }
        .cat-item { text-align: center; background: white; padding: 12px 5px; border-radius: 15px; border: 1px solid #f2f2f2; box-shadow: var(--shadow-soft); }
        .cat-icon-wrap { width: 45px; height: 45px; background: var(--primary-soft); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
        .cat-item i { color: var(--primary); font-size: 18px; }
        .cat-item p { font-size: 10px; font-weight: 700; color: #444; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px; }
        .card { background: white; border-radius: 18px; border: 1px solid #f0f0f0; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 150px; object-fit: cover; cursor: pointer; }
        .card-body { padding: 10px; }
        .status-badge { font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 6px; margin-bottom: 5px; display: inline-block; }
        .status-ready { background: #e8f5e9; color: #2e7d32; }
        .status-order { background: #fff3e0; color: #ef6c00; }
        .card-title { font-size: 12px; font-weight: 700; margin-bottom: 5px; height: 32px; overflow: hidden; }
        .card-price { color: var(--primary); font-weight: 800; font-size: 14px; }

        /* Product Detail Modal */
        #productModal {
            position: fixed; inset: 0; background: white; z-index: 3000; display: none; overflow-y: auto;
        }
        .modal-header { position: sticky; top: 0; padding: 15px; background: white; z-index: 10; display: flex; justify-content: space-between; }
        .detail-swiper { width: 100%; height: 350px; }
        .detail-content { padding: 20px; }
        .detail-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        .detail-info { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .info-label { font-weight: 600; color: #666; }
        .info-val { font-weight: 700; color: var(--dark); }

        /* Buttons */
        .btn-group { display: flex; gap: 6px; margin-top: 10px; }
        .order-btn { flex: 1; background: #25D366; color: white; border: none; padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .cart-btn { width: 45px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; }

        /* Footer Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid #eee; z-index: 2000; }
        .nav-link { text-decoration: none; color: #bbb; text-align: center; font-size: 10px; font-weight: 700; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--primary); }

        .view { display: none; }
        .view.active { display: block; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 10px 20px; border-radius: 50px; z-index: 4000; display: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="toast">Səbətə əlavə edildi! 🛒</div>

    <div id="productModal">
        <div class="modal-header">
            <button class="header-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <button class="header-btn" style="background: var(--primary); color: white;"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <div class="swiper detail-swiper">
            <div class="swiper-wrapper" id="modal-images"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="detail-content">
            <div class="detail-title" id="modal-title">Məhsul Adı</div>
            <div id="modal-status"></div>
            
            <div class="detail-info">
                <div class="info-row"><span class="info-label">Qiymət:</span> <span class="info-val" id="modal-price" style="color: var(--primary); font-size: 18px;">0.00 AZN</span></div>
                <div class="info-row"><span class="info-label">Kateqoriya:</span> <span class="info-val" id="modal-cat">-</span></div>
                <div class="info-row"><span class="info-label">Məhsul kodu:</span> <span class="info-val" id="modal-code">-</span></div>
                <div style="margin-top:15px;">
                    <p class="info-label">Məhsul haqqında:</p>
                    <p id="modal-desc" style="font-size: 14px; line-height: 1.6; margin-top: 8px; color: #444;"></p>
                </div>
            </div>
            
            <div class="btn-group" style="margin-top: 30px;">
                <button class="order-btn" id="modal-order-btn" style="padding: 16px; font-size: 14px;">WhatsApp ilə Sifariş</button>
                <button class="cart-btn" id="modal-cart-btn"><i class="fa-solid fa-cart-plus"></i></button>
            </div>
        </div>
    </div>

    <header>
        <div class="header-top">
            <img src="https://i.postimg.cc/5t87Yx8F/1774906530079.png" class="logo-img" />
            <div style="width: 1px; height: 20px; background: #ddd;"></div>
            <img src="https://i.postimg.cc/Rq5QVZxB/1774906294188.png" class="logo-img" />
        </div>
        <div class="search-area">
            <button class="header-btn" onclick="goHome()"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass" style="color:#ccc;"></i>
                <input type="text" id="searchInput" placeholder="Məhsul və ya kod axtar..." onkeyup="filterProducts()" />
            </div>
            <button class="header-btn"><i class="fa-solid fa-star" style="color: #ffd700;"></i></button>
        </div>
    </header>

    <main id="app">
        <section id="home" class="view active">
            <div class="swiper hero-swiper">
                <div class="swiper-wrapper" id="banner-wrapper"></div>
            </div>
            <h2 id="list-title" style="padding: 10px 16px; font-size: 18px; font-weight: 800;">Yeni gələnlər</h2>
            <div class="products-grid" id="product-list"></div>
        </section>

        <section id="catalog" class="view">
            <h2 style="padding: 20px 16px 5px; font-size: 20px; font-weight: 800;">Bölmələr</h2>
            <div class="cat-grid" id="category-list"></div>
        </section>

        <section id="cart" class="view">
            <div style="padding: 20px;">
                <h2 style="margin-bottom:20px; font-weight: 800;">Səbətim</h2>
                <div id="cart-items"></div>
                <div id="cart-summary" style="margin-top:30px; display:none; background: var(--light); padding: 20px; border-radius: 18px;">
                    <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom: 15px;">
                        <span>Cəmi məbləğ:</span> <span id="total-price">0 AZN</span>
                    </div>
                    <button onclick="orderCartWhatsApp()" class="order-btn" style="width:100%; padding:16px;">Sifarişi tamamla</button>
                </div>
            </div>
        </section>

        <section id="contact" class="view">
            <div style="padding: 20px; text-align: center;">
                <div style="background: var(--primary-soft); padding: 40px 20px; border-radius: 30px; margin-bottom: 20px; border: 1px solid var(--primary);">
                    <h3 style="color: var(--primary); font-size: 24px;">SenLife</h3>
                    <p style="font-size: 14px; margin-top: 10px; color: #666;">Hər əl işində bir sevgi var.</p>
                </div>
                <div style="display: grid; gap: 12px;">
                    <a href="https://wa.me/994773526665" style="text-decoration:none; color:white; background:#25D366; padding:18px; border-radius:18px; font-weight:700; display: flex; align-items: center; justify-content: center; gap: 10px;"><i class="fa-brands fa-whatsapp"></i> WhatsApp Dəstək</a>
                    <a href="https://www.instagram.com/senlife.az?igsh=eDU4d3N6ZjQ2aGJm" style="text-decoration:none; color:white; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding:18px; border-radius:18px; font-weight:700; display: flex; align-items: center; justify-content: center; gap: 10px;"><i class="fa-brands fa-instagram"></i> Instagram</a>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="showView('home', this)"><i class="fa-solid fa- house"></i><p>Ana Səhifə</p></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('catalog', this)"><i class="fa-solid fa-shapes"></i><p>Kataloq</p></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('cart', this)"><i class="fa-solid fa-cart-shopping"></i><p>Səbət</p></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('contact', this)"><i class="fa-solid fa-heart"></i><p>SenLife</p></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const products = [
            { id: 1, code: 'SN001', name: 'Gips Mini Qutusu', price: 12.00, cat: 'Gips məhsullar', images: ['https://picsum.photos/600/600?1', 'https://picsum.photos/600/600?11'], status: 'Hazırdır', desc: 'Tamamilə əl işidir, dekorativ məqsədlər üçün istifadə edilə bilər.' },
            { id: 2, code: 'SN002', name: 'Dekorativ Şam', price: 18.50, cat: 'Şamlar', images: ['https://picsum.photos/600/600?2', 'https://picsum.photos/600/600?22'], status: 'Sifarişlə', desc: 'Təbii soya mumundan hazırlanmış, ətirli dekorativ şam.' }
        ];

        const categories = [
            { name: 'Ev əşyaları', icon: 'fa-house-chimney' }, { name: 'Aksessuarlar', icon: 'fa-gem' },
            { name: 'Şamlar', icon: 'fa-fire-burner' }, { name: 'Gips məhsullar', icon: 'fa-cubes' },
            { name: 'Hədiyyəlik', icon: 'fa-box-open' }
        ];

        let cart = [];
        let detailSwiper;

        function init() {
            renderProducts(products);
            renderCategories();
            renderBanners();
        }

        function renderProducts(data) {
            const list = document.getElementById('product-list');
            list.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.images[0]}" class="card-img" onclick="openProduct(${p.id})" />
                    <div class="card-body">
                        <span class="status-badge ${p.status === 'Hazırdır' ? 'status-ready' : 'status-order'}">${p.status}</span>
                        <div class="card-title" onclick="openProduct(${p.id})">${p.name}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="card-price">${p.price.toFixed(2)} AZN</div>
                            <button class="cart-btn" onclick="addToCart(${p.id})" style="width:32px; height:32px; font-size:12px;"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price.toFixed(2) + " AZN";
            document.getElementById('modal-cat').innerText = p.cat;
            document.getElementById('modal-code').innerText = p.code;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-status').innerHTML = `<span class="status-badge ${p.status === 'Hazırdır' ? 'status-ready' : 'status-order'}">${p.status}</span>`;
            
            const imgWrapper = document.getElementById('modal-images');
            imgWrapper.innerHTML = p.images.map(img => `<div class="swiper-slide"><img src="${img}" style="width:100%; height:100%; object-fit:cover;"></div>`).join('');
            
            document.getElementById('modal-order-btn').onclick = () => orderSingle(p.code, p.name, p.price);
            document.getElementById('modal-cart-btn').onclick = () => addToCart(p.id);

            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';

            if (detailSwiper) detailSwiper.destroy();
            detailSwiper = new Swiper('.detail-swiper', {
                pagination: { el: '.swiper-pagination' },
                autoplay: { delay: 3000 },
                loop: p.images.length > 1
            });
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
            updateCart();
        }

        function updateCart() {
            const cartList = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-price');
            const summary = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                cartList.innerHTML = `<div style="text-align:center; padding:50px; color:#999;">Səbətiniz boşdur.</div>`;
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            let total = 0;
            cartList.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div style="display:flex; gap:15px; margin-bottom:15px; background:#f9f9f9; padding:10px; border-radius:15px;">
                        <img src="${item.images[0]}" style="width:70px; height:70px; border-radius:10px; object-fit:cover;">
                        <div style="flex:1;">
                            <div style="font-weight:700; font-size:14px;">${item.name}</div>
                            <div style="color:var(--primary); font-weight:800; margin-top:5px;">${item.price.toFixed(2)} AZN</div>
                        </div>
                        <button onclick="removeFromCart(${index})" style="background:none; border:none; color:#ff4d4d;"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            }).join('');
            totalEl.innerText = total.toFixed(2) + " AZN";
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function orderSingle(code, name, price) {
            const msg = `Salam SenLife! ✨ \nBu məhsulu sifariş vermək istəyirəm:\n\n📦 *Məhsul:* ${name}\n🔢 *Kod:* ${code}\n💰 *Qiymət:* ${price} AZN\n\nMəlumat verərdiniz zəhmət olmasa.`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(msg)}`);
        }

        function orderCartWhatsApp() {
            let itemsText = cart.map(i => `- ${i.name} (Kod: ${i.code})`).join('\n');
            let total = cart.reduce((a, b) => a + b.price, 0).toFixed(2);
            const msg = `Salam SenLife! ✨ \nSəbətimdəki məhsulları sifariş vermək istəyirəm:\n\n${itemsText}\n\n⭐ *Ümumi məbləğ:* ${total} AZN\n\nSifarişi təsdiqləmək üçün geri dönüşünüzü gözləyirəm.`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(msg)}`);
        }

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('searchInput').value = '';
            document.getElementById('list-title').innerText = "Yeni gələnlər";
            renderProducts(products);
            showView('home', document.querySelector('.nav-link:first-child'));
        }

        function filterProducts() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(val) || p.code.toLowerCase().includes(val));
            renderProducts(filtered);
            document.getElementById('list-title').innerText = val ? `Axtarış: ${val}` : "Yeni gələnlər";
        }

        function renderCategories() {
            document.getElementById('category-list').innerHTML = categories.map(c => `
                <div class="cat-item" onclick="filterByCat('${c.name}')">
                    <div class="cat-icon-wrap"><i class="fa-solid ${c.icon}"></i></div>
                    <p>${c.name}</p>
                </div>
            `).join('');
        }

        function filterByCat(cat) {
            const filtered = products.filter(p => p.cat === cat);
            renderProducts(filtered);
            document.getElementById('list-title').innerText = cat;
            showView('home', document.querySelector('.nav-link:first-child'));
        }

        function renderBanners() {
            const wrapper = document.getElementById('banner-wrapper');
            const data = [
                { t: "Əl işi hədiyyələr", img: "https://picsum.photos/800/400?10" },
                { t: "Yeni Kolleksiya", img: "https://picsum.photos/800/400?11" }
            ];
            wrapper.innerHTML = data.map(b => `<div class="swiper-slide"><div class="banner-slide" style="background-image:url('${b.img}')"><div class="banner-overlay"></div></div></div>`).join('');
            new Swiper('.hero-swiper', { loop: true, autoplay: { delay: 4000 } });
        }

        init();
    </script>
</body>
</html>
