<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SenLife Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">

<style>
:root{
--primary:#ff4d4d;
--soft:#fff5f5;
--dark:#121212;
}

body{font-family:Inter;margin:0;background:#fff;}

header{padding:10px;border-bottom:1px solid #eee;background:#fff;}

.search{display:flex;gap:10px;padding:10px;}

.search input{flex:1;padding:10px;border-radius:50px;border:none;background:#f5f5f5;}

button{border:none;border-radius:12px;padding:10px;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}

.card{border:1px solid #eee;border-radius:15px;overflow:hidden;}

.card img{width:100%;height:150px;object-fit:cover;}

.card-body{padding:10px;}

.view{display:none;}
.view.active{display:block;}

.bottom{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#fff;padding:10px;border-top:1px solid #eee;}

.badge{background:red;color:#fff;font-size:10px;padding:3px 6px;border-radius:6px;}

.sticky{position:fixed;bottom:70px;width:90%;left:5%;}

</style>
</head>

<body>

<header>
<div class="search">
<button onclick="goHome()"><i class="fa fa-arrow-left"></i></button>
<input id="search" placeholder="Axtar..." onkeyup="filter()">
<button><i class="fa fa-gift"></i></button>
</div>
</header>

<!-- HOME -->
<section id="home" class="view active">
<div class="grid" id="list"></div>
</section>

<!-- DETAIL -->
<section id="detail" class="view">
<div id="detailBox"></div>
</section>

<!-- CART -->
<section id="cart" class="view">
<div id="cartList"></div>
<button onclick="orderCart()">WhatsApp sifariş</button>
</section>

<!-- ADMIN -->
<section id="admin" class="view">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Ad">
<input id="pprice" placeholder="Qiymət">
<button onclick="addProduct()">Əlavə et</button>
</section>

<nav class="bottom">
<button onclick="show('home')">Home</button>
<button onclick="show('cart')">Cart</button>
<button onclick="show('admin')">Admin</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

<script>

let products=[
{id:1,name:"Şam",price:15,code:"SN1",cat:"Şam",img:"https://picsum.photos/400?1",stock:3},
{id:2,name:"Qutu",price:20,code:"SN2",cat:"Qutu",img:"https://picsum.photos/400?2",stock:5}
];

let cart=[];

/* RENDER */
function render(data){
document.getElementById("list").innerHTML=data.map(p=>`
<div class="card" onclick="openP(${p.id})">
<img src="${p.img}">
<div class="card-body">
<b>${p.name}</b><br>
${p.price} AZN<br>
${p.stock<4?'<span class="badge">Son '+p.stock+'</span>':''}
</div>
</div>
`).join('');
}

/* DETAIL */
function openP(id){
let p=products.find(x=>x.id==id);

detailBox.innerHTML=`
<div class="swiper">
<div class="swiper-wrapper">
<div class="swiper-slide"><img src="${p.img}" width="100%"></div>
<div class="swiper-slide"><img src="${p.img}" width="100%"></div>
</div>
</div>

<div style="padding:20px">
<h2>${p.name}</h2>
<p>${p.price} AZN</p>
<p>Kod: ${p.code}</p>

<button onclick="addCart(${p.id})">Səbətə at</button>
<button onclick="orderOne(${p.id})">WhatsApp</button>
</div>

<div class="sticky">
<button style="width:100%;background:green;color:#fff" onclick="orderOne(${p.id})">Sifariş et</button>
</div>
`;

show("detail");

new Swiper('.swiper',{autoplay:{delay:2000},loop:true});
}

/* CART */
function addCart(id){
cart.push(products.find(p=>p.id==id));
alert("Əlavə edildi");
}

function renderCart(){
cartList.innerHTML=cart.map(p=>`
<div>${p.name} - ${p.price}</div>
`).join('');
}

function orderCart(){
let msg="Salam 😊\n\nSifariş:\n";
cart.forEach(p=>msg+=p.name+" "+p.price+"\n");
window.open("https://wa.me/994773526665?text="+encodeURIComponent(msg));
}

/* SINGLE ORDER */
function orderOne(id){
let p=products.find(x=>x.id==id);

let msg=`Salam 😊

${p.name} sifariş etmək istəyirəm
Qiymət: ${p.price}
Kod: ${p.code}`;

window.open("https://wa.me/994773526665?text="+encodeURIComponent(msg));
}

/* FILTER */
function filter(){
let val=search.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(val)));
}

/* ADMIN */
function addProduct(){
let name=pname.value;
let price=pprice.value;

products.push({
id:Date.now(),
name,price,
code:"NEW",
img:"https://picsum.photos/400",
stock:5
});

render(products);
}

/* NAV */
function show(v){
document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
document.getElementById(v).classList.add("active");
renderCart();
}

function goHome(){show("home");}

render(products);

</script>

</body>
</html>
