<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senlife | Professional Marketplace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #121212;
            --accent: #d4a373;
            --bg: #fdfdfd;
            --white: #ffffff;
            --gray: #8e8e93;
            --light-gray: #f2f2f7;
            --radius: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --red-line: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--primary); padding-bottom: 90px; overflow-x: hidden; }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-top { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; margin-bottom: 12px; 
        }
        
        .logo-img { height: 42px; object-fit: contain; }
        
        .red-divider {
            width: 2px; height: 28px;
            background-color: var(--red-line);
            border-radius: 2px;
        }
        
        .search-area { padding: 0 16px; display: flex; gap: 10px; }
        .search-wrapper {
            flex: 1; background: var(--light-gray);
            border-radius: 12px; display: flex; align-items: center; padding: 10px 15px;
        }
        .search-wrapper input {
            border: none; background: none; outline: none; width: 100%; font-size: 14px; margin-left: 8px;
        }

        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- HOME: BANNER (DÜZƏLDİLDİ: 5 ƏDƏD, HƏRƏKƏTLİ, SABİT YAZI) --- */
        .hero-swiper { margin: 20px 0; width: 100%; height: 220px; }
        .swiper-slide { width: auto; } /* Şəkillərin ölçüsünün düzgün olması üçün */
        .banner-slide {
            width: 320px; /* Slayd eni mobil üçün uyğun */
            height: 100%;
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            background-size: cover;
            background-position: center;
        }
        /* Slaydın altına yüngül kölgə ki yazı görünsün */
        .banner-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        }
        /* Yazının sabit olması (sol altda) */
        .banner-title {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            z-index: 10;
        }

        .section-label { padding: 10px 16px; font-weight: 700; font-size: 1.1rem; margin-top: 10px; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
        .card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 12px; }
        .card-title { font-size: 14px; font-weight: 600; margin: 4px 0; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-price { font-size: 15px; font-weight: 700; color: var(--accent); }
        .order-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; font-weight: 600; }

        .cat-banner { background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin: 15px 16px; text-align: center; font-size: 0.85rem; }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 16px; }
        .cat-item { text-align: center; background: white; padding: 15px 5px; border-radius: 12px; box-shadow: var(--shadow); }
        .cat-item i { font-size: 22px; color: var(--accent); margin-bottom: 6px; }
        .cat-item p { font-size: 10px; font-weight: 500; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 10px 0 25px;
            border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-link { text-decoration: none; color: var(--gray); text-align: center; font-size: 10px; transition: 0.2s; }
        .nav-link.active { color: var(--primary); font-weight: 700; }
        .nav-link i { display: block; font-size: 18px; margin-bottom: 3px; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img src="https://i.postimg.cc/5t87Yx8F/1774906530079.png" class="logo-img" alt="Senlife">
            <div class="red-divider"></div>
            <img src="https://i.postimg.cc/Rq5QVZxB/1774906294188.png" class="logo-img" alt="Senlife Alt">
        </div>
        <div class="search-area">
            <div class="search-wrapper">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Axtarış edin...">
            </div>
        </div>
    </header>

    <main id="app">
        <section id="home" class="view active">
            <div class="swiper hero-swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="banner-slide" style="background-image: url('https://picsum.photos/600/400?random=11')">
                            <div class="banner-overlay"></div>
                            <div class="banner-title">Əl İşləri</div>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="banner-slide" style="background-image: url('https://picsum.photos/600/400?random=12')">
                            <div class="banner-overlay"></div>
                            <div class="banner-title">Xüsusi Hədiyyələr</div>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="banner-slide" style="background-image: url('https://picsum.photos/600/400?random=13')">
                            <div class="banner-overlay"></div>
                            <div class="banner-title">Brend Məhsullar</div>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="banner-slide" style="background-image: url('https://picsum.photos/600/400?random=14')">
                            <div class="banner-overlay"></div>
                            <div class="banner-title">Yeni Kolleksiya</div>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="banner-slide" style="background-image: url('https://picsum.photos/600/400?random=15')">
                            <div class="banner-overlay"></div>
                            <div class="banner-title">Endirimlər</div>
                        </div>
                    </div>
                </div>
            </div>
            <h2 class="section-label">Yeni məhsullar</h2>
            <div class="products-grid" id="main-products-list"></div>
        </section>

        <section id="catalog" class="view">
            <div class="cat-banner">Unikal əl işləri və Brend məhsullar</div>
            <div class="cat-grid">
                <div class="cat-item"><i class="fa-solid fa-gem"></i><p>Bujiteriya</p></div>
                <div class="cat-item"><i class="fa-solid fa-fire"></i><p>Şamlar</p></div>
                <div class="cat-item"><i class="fa-solid fa-box-open"></i><p>Şokolad</p></div>
                <div class="cat-item"><i class="fa-solid fa-shapes"></i><p>Gips</p></div>
                <div class="cat-item"><i class="fa-solid fa-mug-hot"></i><p>Keramika</p></div>
                <div class="cat-item"><i class="fa-solid fa-palette"></i><p>Porterlər</p></div>
            </div>
        </section>

        </main>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="switchTab('home', this)">
            <i class="fa-solid fa-house"></i><span>Əsas</span>
        </a>
        <a href="javascript:void(0)" class="nav-link" onclick="switchTab('catalog', this)">
            <i class="fa-solid fa-layer-group"></i><span>Kataloq</span>
        </a>
        <a href="javascript:void(0)" class="nav-link">
            <i class="fa-solid fa-cart-shopping"></i><span>Səbət</span>
        </a>
        <a href="javascript:void(0)" class="nav-link">
            <i class="fa-solid fa-comment-dots"></i><span>Əlaqə</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        // BÖLMƏ KEÇİDLƏRİ
        function switchTab(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0, 0);
        }

        // SWIPER (YENİLƏNDİ: AVTOMATİK HƏRƏKƏTLİ VƏ 5 AFİŞA İÇÜN OPTİMALLAŞDI)
        const swiper = new Swiper('.hero-swiper', {
            slidesPerView: "auto", 
            centeredSlides: true, 
            spaceBetween: 15, 
            loop: true, // Sabit 5 dənə üçün loop vacibdir
            autoplay: { delay: 3500 }, // Hər 3.5 saniyədə hərəkət
            grabCursor: true, // Mobil üçün sürüşdürmə hissi
        });

        // MƏHSULLARIN YÜKLƏNMƏSİ (Dəyişməyib)
        function loadProducts() {
            const list = document.getElementById('main-products-list');
            let html = "";
            for(let i = 1; i <= 10; i++) {
                html += `
                    <div class="card">
                        <img src="https://picsum.photos/400/400?random=${i+20}" class="card-img" loading="lazy">
                        <div class="card-body">
                            <span class="card-type">Premium</span>
                            <h3 class="card-title">Seçilmiş Məhsul #${i}</h3>
                            <p class="card-price">29.90 AZN</p>
                            <button class="order-btn">Sifariş Et</button>
                        </div>
                    </div>
                `;
            }
            list.innerHTML = html;
        }
        loadProducts();
    </script>
</body>
</html>
