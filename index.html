<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senlife</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f8f8f8;
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background:white;
  position:sticky;
  top:0;
}

.search {
  flex:1;
  margin:0 10px;
}

.search input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* BANNER */
.banner {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.banner div {
  min-width:120px;
  height:80px;
  background:#2ecc71;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.btn {
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:8px;
  width:100%;
}

.cart-btn {
  background:#2ecc71;
  color:white;
}

.order-btn {
  background:#27ae60;
  color:white;
}

/* BOTTOM NAV */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ccc;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  🔙
  <div class="search">
    <input placeholder="Axtar...">
  </div>
  ⭐
</div>

<!-- BANNERS -->
<div class="banner">
  <div>Əl işləri</div>
  <div>Premium</div>
  <div>Hədiyyə</div>
  <div>Endirim</div>
  <div>Bonus</div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- BOTTOM -->
<div class="bottom">
  🏠
  📂
  🛒
  ℹ️
</div>

<script>
const phone = "994773526665";

const products = [
  {
    name:"Şam dəsti",
    price:"15 AZN",
    code:"SL001",
    desc:"Əl işi şam",
    img:"https://via.placeholder.com/150"
  },
  {
    name:"Qol saatı",
    price:"45 AZN",
    code:"SL002",
    desc:"Premium saat",
    img:"https://via.placeholder.com/150"
  }
];

function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.price}</p>
      <button class="btn cart-btn">Səbətə əlavə</button>
      <button class="btn order-btn" onclick="order('${p.name}','${p.price}','${p.code}','${p.desc}')">Sifariş et</button>
    `;

    container.appendChild(div);
  });
}

function order(name,price,code,desc){
  const msg = `Salam, bu məhsulu sifariş etmək istəyirəm:

Məhsul: ${name}
Qiymət: ${price}
Kod: ${code}
Təsvir: ${desc}

Ad:
Ünvan:
Telefon:`;

  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}

renderProducts();
</script>

</body>
</html>
