<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senlife | Premium Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .rounded-card { border-radius: 2rem; }
        .shadow-soft { box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .hidden-section { display: none; }
        .active-tab { color: #22c55e !important; }
        
        /* Banner Animasiyası */
        #banner-container { transition: all 0.5s ease-in-out; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-50 p-4 shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="toggleAdminModal()" class="p-2 hover:bg-gray-100 rounded-full transition">
                <i class="fa-solid fa-bars text-xl text-gray-700"></i>
            </button>
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Məhsul, kod və ya açar söz..." 
                    class="w-full bg-gray-50 border-none rounded-2xl py-3 pl-11 pr-4 text-sm focus:ring-2 focus:ring-green-500 outline-none">
            </div>
        </div>
    </header>

    <main id="main-content">
        <div class="px-4 mt-4">
            <div id="banner-container" class="h-44 rounded-[2rem] flex items-center justify-center text-center p-6 border-2 border-green-50 shadow-soft">
                <h2 id="banner-text" class="text-2xl font-extrabold text-green-700">Senlife-a Xoş Gəldiniz</h2>
            </div>
        </div>

        <div class="px-4 mt-8">
            <h3 class="font-extrabold text-lg mb-4 ml-2">Bölmələr</h3>
            <div class="grid grid-cols-4 gap-3" id="categories-grid">
                </div>
        </div>

        <div class="px-4 mt-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-extrabold text-lg ml-2">Yeni Məhsullar</h3>
            </div>
            <div class="grid grid-cols-2 gap-4" id="products-grid">
                </div>
        </div>
    </main>

    <section id="about-section" class="hidden-section p-6">
        <div class="border-[6px] border-green-500 rounded-[2.5rem] p-8 bg-white shadow-2xl">
            <h1 class="text-3xl font-black text-green-600 mb-4 tracking-tighter">Senlife nədir?</h1>
            <p class="text-gray-800 font-semibold leading-relaxed mb-8">
                Salam! Senlife sizin üçün ən özəl əl işlərini, premium məhsulları və səmimiyyəti bir araya gətirən butik platformadır.
            </p>
            <div class="space-y-4 text-sm">
                <div class="flex items-center gap-4 p-4 bg-green-50 rounded-2xl">
                    <i class="fa-brands fa-whatsapp text-2xl text-green-600"></i>
                    <div><p class="font-bold">077 352 66 65</p></div>
                </div>
                <div class="flex items-center gap-4 p-4 bg-green-50 rounded-2xl">
                    <i class="fa-brands fa-instagram text-2xl text-pink-600"></i>
                    <div><p class="font-bold">senlife.az</p></div>
                </div>
            </div>
        </div>
    </section>

    <section id="cart-section" class="hidden-section p-4">
        <h2 class="text-2xl font-black mb-6">Səbətim</h2>
        <div id="cart-items" class="space-y-4"></div>
        <div class="mt-8 border-t pt-4">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Cəmi:</span>
                <span id="total-price">0 AZN</span>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50 backdrop-blur-md">
        <button onclick="showSection('main')" class="flex flex-col items-center gap-1 text-gray-400 nav-btn active-tab">
            <i class="fa-solid fa-house"></i><span class="text-[10px] font-bold">Ana səhifə</span>
        </button>
        <button onclick="showSection('categories')" class="flex flex-col items-center gap-1 text-gray-400 nav-btn">
            <i class="fa-solid fa-layer-group"></i><span class="text-[10px] font-bold">Bölmələr</span>
        </button>
        <button onclick="showSection('cart')" class="flex flex-col items-center gap-1 text-gray-400 nav-btn">
            <i class="fa-solid fa-bag-shopping"></i><span class="text-[10px] font-bold">Səbət</span>
        </button>
        <button onclick="showSection('about')" class="flex flex-col items-center gap-1 text-gray-400 nav-btn">
            <i class="fa-solid fa-circle-info"></i><span class="text-[10px] font-bold">Haqqında</span>
        </button>
    </nav>

    <div id="adminModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl relative">
            <button onclick="toggleAdminModal()" class="absolute right-6 top-6 text-gray-400"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="text-xl font-black mb-4">Admin Girişi</h3>
            <input type="password" id="adminPass" placeholder="Parol" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-green-500 mb-4">
            <button onclick="checkAdminPass()" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold shadow-lg shadow-green-200">Giriş</button>
        </div>
    </div>

    <script>
        // DATA
        const categories = [
            { id: 1, name: "Ev əşyaları", icon: "🏠" },
            { id: 2, name: "Geyim", icon: "👕" },
            { id: 3, name: "Büjiteriya", icon: "💍" },
            { id: 4, name: "Saatlar", icon: "⌚" },
            { id: 5, name: "Zərif dadlar", icon: "🍫" },
            { id: 6, name: "Ətirlər", icon: "🌸" },
            { id: 7, name: "Şam & Gips", icon: "🕯️" },
            { id: 8, name: "Hədiyyələr", icon: "🎁" }
        ];

        const banners = [
            { text: "🧵 Əl işləri", color: "#f0fdf4" },
            { text: "💎 Premium məhsullar", color: "#f8fafc" },
            { text: "🎁 Hədiyyəlik qutular", color: "#fff7ed" },
            { text: "🔥 Endirimlər", color: "#fef2f2" },
            { text: "⭐ Bonuslar", color: "#f0fdfa" }
        ];

        let cart = JSON.parse(localStorage.getItem('senlife-cart')) || [];

        // RENDER FUNCTIONS
        function init() {
            renderCategories();
            renderProducts();
            startBanner();
        }

        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = categories.map(cat => `
                <div class="flex flex-col items-center gap-2 hover:scale-105 transition cursor-pointer">
                    <div class="w-14 h-14 bg-white border border-gray-100 rounded-2xl flex items-center justify-center text-xl shadow-sm">${cat.icon}</div>
                    <span class="text-[10px] font-bold text-gray-600 text-center uppercase">${cat.name}</span>
                </div>
            `).join('');
        }

        function renderProducts() {
            // Test üçün bir neçə məhsul
            const products = [
                { id: 1, name: "Premium Broş", price: 25, code: "B101", img: "https://via.placeholder.com/200" },
                { id: 2, name: "Gips Dekor", price: 15, code: "G202", img: "https://via.placeholder.com/200" }
            ];
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white rounded-card p-3 shadow-soft border border-gray-50 flex flex-col">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded-3xl mb-3">
                    <h4 class="font-bold text-sm text-gray-800">${p.name}</h4>
                    <p class="text-green-600 font-black mt-1">${p.price} AZN</p>
                    <button onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.code}')" class="mt-3 w-full py-3 bg-gray-900 text-white rounded-2xl text-[10px] font-bold active:scale-95 transition">SƏBƏTƏ AT</button>
                </div>
            `).join('');
        }

        function startBanner() {
            let i = 0;
            setInterval(() => {
                i = (i + 1) % banners.length;
                const b = document.getElementById('banner-container');
                const t = document.getElementById('banner-text');
                b.style.backgroundColor = banners[i].color;
                t.innerText = banners[i].text;
            }, 1300);
        }

        // NAVIGATION
        function showSection(section) {
            document.querySelectorAll('section, main').forEach(s => s.classList.add('hidden-section'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            
            if (section === 'main') document.getElementById('main-content').classList.remove('hidden-section');
            if (section === 'about') document.getElementById('about-section').classList.remove('hidden-section');
            if (section === 'cart') {
                document.getElementById('cart-section').classList.remove('hidden-section');
                renderCart();
            }
        }

        // CART LOGIC
        function addToCart(id, name, price, code) {
            cart.push({ id, name, price, code });
            localStorage.setItem('senlife-cart', JSON.stringify(cart));
            alert('Səbətə əlavə edildi!');
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-price');
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-10 font-bold">Səbət boşdur.</p>`;
                totalEl.innerText = "0 AZN";
                return;
            }
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                total += item.price;
                return `
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                        <div>
                            <h4 class="font-bold">${item.name}</h4>
                            <p class="text-xs text-gray-500">Kod: ${item.code}</p>
                            <p class="text-green-600 font-bold">${item.price} AZN</p>
                        </div>
                        <button onclick="removeFromCart(${idx})" class="text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            }).join('');
            totalEl.innerText = total + " AZN";
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('senlife-cart', JSON.stringify(cart));
            renderCart();
        }

        // ADMIN LOGIN
        function toggleAdminModal() {
            const modal = document.getElementById('adminModal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function checkAdminPass() {
            const p = document.getElementById('adminPass').value;
            if (p === "20152021Sn/_/") {
                alert("Admin Paneli Tezliklə Hazır Olacaq!");
                toggleAdminModal();
            } else {
                alert("Səhv parol!");
            }
        }

        init();
    </script>
</body>
</html>
