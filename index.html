<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SenLife | Ultra-Premium Experience</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        :root {
            --accent: #920000; /* Daha dərin, aristokrat qırmızı */
            --bg: #ffffff;
            --surface: #fcfcfc;
            --text: #1a1a1a;
            --subtext: #707070;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 12px 40px rgba(0,0,0,0.06);
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 100px; line-height: 1.5; }

        /* --- Ağıllı Header --- */
        header { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            position: sticky; top: 0; z-index: 1000; 
            padding: 15px 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.04);
            display: flex; align-items: center; justify-content: space-between;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand img { height: 32px; filter: contrast(1.1); }
        .header-icons { display: flex; gap: 12px; }
        .icon-btn { 
            width: 44px; height: 44px; border-radius: 15px; 
            background: #fff; border: 1px solid #f0f0f0; 
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--text); box-shadow: var(--shadow);
        }

        /* --- Sürətli Axtarış (Dinamik) --- */
        .search-container { padding: 15px 20px; }
        .search-bar { 
            background: var(--surface); border-radius: 18px; 
            padding: 0 15px; height: 50px; 
            display: flex; align-items: center; gap: 10px;
            border: 1px solid #eee; transition: 0.3s;
        }
        .search-bar:focus-within { border-color: var(--accent); background: #fff; box-shadow: var(--shadow); }
        .search-bar input { border: none; background: none; outline: none; flex: 1; font-weight: 500; font-size: 15px; }

        /* --- Banner: Kinematik Effekt --- */
        .hero-section { margin-bottom: 20px; }
        .hero-swiper { height: 260px; border-radius: var(--radius); margin: 0 20px; overflow: hidden; }
        .slide-inner { 
            width: 100%; height: 100%; background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 30px; position: relative;
        }
        .slide-inner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 60%); }
        .slide-content { position: relative; z-index: 2; color: #fff; }
        .slide-content h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }

        /* --- Kateqoriya "Bubbles" --- */
        .cats-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 10px 20px 25px; scrollbar-width: none; }
        .cats-scroll::-webkit-scrollbar { display: none; }
        .cat-item { 
            flex: 0 0 auto; padding: 10px 22px; border-radius: 14px; 
            background: var(--surface); border: 1px solid #eee;
            font-size: 13px; font-weight: 700; color: var(--subtext); transition: 0.3s;
        }
        .cat-item.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 8px 20px rgba(146,0,0,0.25); }

        /* --- Məhsul Kartları: Ultra Modern --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 20px; }
        .item-card { background: #fff; border-radius: var(--radius); overflow: hidden; position: relative; transition: 0.3s; }
        .img-box { height: 210px; border-radius: var(--radius); overflow: hidden; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .item-card:active .img-box img { transform: scale(1.05); }
        .price-tag { 
            position: absolute; top: 12px; right: 12px; 
            background: var(--glass); backdrop-filter: blur(8px);
            padding: 6px 12px; border-radius: 12px; font-weight: 800; font-size: 14px; color: var(--accent);
        }
        .item-info { padding: 12px 4px; }
        .item-info h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .item-info p { font-size: 12px; color: var(--subtext); }

        /* --- Premium Modal (Product Page) --- */
        .p-modal { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; }
        .p-modal-header { height: 450px; position: relative; }
        .p-modal-header img { width: 100%; height: 100%; object-fit: cover; }
        .p-float-btns { 
            position: absolute; top: 20px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 10;
        }
        .p-body { 
            background: #fff; border-radius: 35px 35px 0 0; 
            margin-top: -35px; position: relative; padding: 30px 25px;
        }
        .p-status { color: #25D366; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .p-title { font-family: 'Syne', sans-serif; font-size: 28px; margin-bottom: 10px; }
        .p-price { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 20px; }
        
        .p-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .meta-box { background: var(--surface); padding: 15px; border-radius: 18px; border: 1px solid #f0f0f0; }
        .meta-box small { color: var(--subtext); font-size: 11px; display: block; margin-bottom: 4px; }
        .meta-box span { font-weight: 700; font-size: 14px; }

        .p-desc { color: var(--subtext); line-height: 1.7; font-size: 14px; margin-bottom: 30px; }

        /* --- Alt Naviqasiya (Floating) --- */
        .dock { 
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(26, 26, 26, 0.95); backdrop-filter: blur(12px);
            height: 70px; border-radius: 22px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 1500;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .dock-link { color: #888; text-decoration: none; font-size: 20px; transition: 0.3s; position: relative; }
        .dock-link.active { color: #fff; transform: translateY(-5px); }
        .dock-link.active::after { 
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background: var(--accent); border-radius: 50%;
        }
        .dock-badge { 
            position: absolute; top: -8px; right: -8px; 
            background: var(--accent); color: #fff; font-size: 10px;
            width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: 2px solid #1a1a1a;
        }

        /* --- Sifariş Paneli --- */
        .order-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff; 
            padding: 20px 25px 40px; box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
            display: flex; gap: 15px; z-index: 2100;
        }
        .btn-main { 
            flex: 1; height: 60px; border-radius: 18px; border: none;
            background: var(--accent); color: #fff; font-weight: 700; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-side { width: 60px; height: 60px; border-radius: 18px; border: 1px solid #eee; background: #fff; font-size: 20px; }

        .view { display: none; }
        .view.active { display: block; }

        /* Animasiyalar */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://i.postimg.cc/5t87Yx8F/1774906530079.png" alt="SenLife">
        </div>
        <div class="header-icons">
            <div class="icon-btn" onclick="showView('cart', this)"><i class="fa-solid fa-bag-shopping"></i></div>
        </div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass" style="color: #ccc;"></i>
            <input type="text" id="mainSearch" placeholder="Eksklüziv məhsulları kəşf et..." onkeyup="dynamicSearch()">
        </div>
    </div>

    <main>
        <section id="homeView" class="view active">
            <div class="hero-section">
                <div class="swiper hero-swiper">
                    <div class="swiper-wrapper" id="bannerSlides"></div>
                </div>
            </div>

            <div class="cats-scroll" id="catBar"></div>

            <div class="grid" id="productGrid"></div>
        </section>

        <section id="cartView" class="view">
            <div style="padding: 25px;">
                <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 25px;">Sizin Seçimlər</h2>
                <div id="cartList"></div>
                <div id="cartEmpty" style="text-align: center; padding: 50px 0; display: none;">
                    <i class="fa-solid fa-box-open" style="font-size: 60px; color: #eee; margin-bottom: 20px;"></i>
                    <p style="color: #999;">Səbətiniz hələ ki boşdur.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="productModal" class="p-modal animate-up">
        <div class="p-modal-header">
            <div class="p-float-btns">
                <button class="icon-btn" onclick="closeP()"><i class="fa-solid fa-xmark"></i></button>
                <button class="icon-btn" onclick="shareP()"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
            </div>
            <div class="swiper modal-swiper" style="height: 100%;">
                <div class="swiper-wrapper" id="modalImgContainer"></div>
            </div>
        </div>
        <div class="p-body">
            <span class="p-status">Mövcuddur</span>
            <h1 class="p-title" id="pTitle"></h1>
            <div class="p-price" id="pPrice"></div>
            
            <div class="p-meta">
                <div class="meta-box"><small>Artikul</small><span id="pCode"></span></div>
                <div class="meta-box"><small>Kateqoriya</small><span id="pCat"></span></div>
            </div>

            <p class="p-desc" id="pDesc"></p>

            <h3 style="font-family: 'Syne'; margin-bottom: 15px;">Sizin üçün maraqlı olar</h3>
            <div class="grid" id="pRelated" style="padding: 0; margin-bottom: 100px;"></div>
        </div>
        <div class="order-panel">
            <button class="btn-side" id="pCartBtn"><i class="fa-solid fa-cart-plus"></i></button>
            <button class="btn-main" id="pOrderBtn"><i class="fa-brands fa-whatsapp"></i> WhatsApp ilə al</button>
        </div>
    </div>

    <nav class="dock">
        <div class="dock-link active" onclick="showView('homeView', this)"><i class="fa-solid fa-house-chimney"></i></div>
        <div class="dock-link" onclick="showView('catalogView', this)"><i class="fa-solid fa-shapes"></i></div>
        <div class="dock-link" onclick="showView('cartView', this)">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="dock-badge" id="cartCount">0</span>
        </div>
        <div class="dock-link" onclick="showView('userView', this)"><i class="fa-solid fa-user-ninja"></i></div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        // Məhsul datası
        const store = [
            { id: 1, name: "Premium Gips Set", price: 35.00, code: "SL-991", cat: "Dekor", desc: "Minimalist dizaynlı əl işi gips dəsti. Evinizə modern ab-hava qatacaq eksklüziv parça.", imgs: ["https://picsum.photos/800/1000?1", "https://picsum.photos/800/1000?11"] },
            { id: 2, name: "Soya Mumu Şamı", price: 19.00, code: "SL-442", cat: "Şamlar", desc: "Təbii soya mumundan hazırlanmış, 48 saat yanma müddətinə malik ətirli şam.", imgs: ["https://picsum.photos/800/1000?2"] },
            { id: 3, name: "Mərmər Altlıq", price: 12.00, code: "SL-103", cat: "Mətbəx", desc: "İtalyan mərmərindən ilhamlanmış xüsusi cilalanmış altlıq.", imgs: ["https://picsum.photos/800/1000?3"] },
            { id: 4, name: "SenLife Gift Box", price: 55.00, code: "SL-BOX", cat: "Hədiyyə", desc: "İçərisində 5 fərqli premium məhsul olan lüks hədiyyə qutusu.", imgs: ["https://picsum.photos/800/1000?4"] }
        ];

        let cart = JSON.parse(localStorage.getItem('ultra_cart')) || [];

        function init() {
            renderHero();
            renderCats();
            renderProducts(store);
            updateCartBadge();
        }

        function renderHero() {
            const data = ["Yeni Sezon", "Əl İşləri", "Premium Seçimlər"];
            document.getElementById('bannerSlides').innerHTML = data.map((t, i) => `
                <div class="swiper-slide">
                    <div class="slide-inner" style="background-image: url('https://picsum.photos/1000/600?sig=${i}')">
                        <div class="slide-content">
                            <h2>${t}</h2>
                        </div>
                    </div>
                </div>
            `).join('');
            new Swiper('.hero-swiper', { loop: true, autoplay: { delay: 3000 } });
        }

        function renderCats() {
            const cats = ["Hamısı", "Dekor", "Şamlar", "Hədiyyə", "Mətbəx"];
            document.getElementById('catBar').innerHTML = cats.map((c, i) => `
                <div class="cat-item ${i===0?'active':''}" onclick="filterCat('${c}', this)">${c}</div>
            `).join('');
        }

        function renderProducts(data) {
            document.getElementById('productGrid').innerHTML = data.map(p => `
                <div class="item-card" onclick="openP(${p.id})">
                    <div class="img-box">
                        <img src="${p.imgs[0]}" loading="lazy">
                        <div class="price-tag">${p.price.toFixed(2)} ₼</div>
                    </div>
                    <div class="item-info">
                        <p>${p.cat}</p>
                        <h3>${p.name}</h3>
                    </div>
                </div>
            `).join('');
        }

        function openP(id) {
            const p = store.find(x => x.id === id);
            const modal = document.getElementById('productModal');
            
            document.getElementById('pTitle').innerText = p.name;
            document.getElementById('pPrice').innerText = p.price.toFixed(2) + " ₼";
            document.getElementById('pCode').innerText = p.code;
            document.getElementById('pCat').innerText = p.cat;
            document.getElementById('pDesc').innerText = p.desc;
            
            document.getElementById('modalImgContainer').innerHTML = p.imgs.map(img => `
                <div class="swiper-slide"><img src="${img}"></div>
            `).join('');

            // Related
            const related = store.filter(x => x.id !== p.id).slice(0, 2);
            document.getElementById('pRelated').innerHTML = related.map(rp => `
                <div class="item-card" onclick="openP(${rp.id})">
                    <div class="img-box" style="height:150px;">
                        <img src="${rp.imgs[0]}">
                    </div>
                    <div class="item-info"><h3>${rp.name}</h3></div>
                </div>
            `).join('');

            document.getElementById('pCartBtn').onclick = (e) => { e.stopPropagation(); addToCart(p.id); };
            document.getElementById('pOrderBtn').onclick = () => { directOrder(p.code, p.name); };

            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            new Swiper('.modal-swiper', { pagination: { el: '.swiper-pagination' } });
        }

        function closeP() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function addToCart(id) {
            const p = store.find(x => x.id === id);
            cart.push(p);
            localStorage.setItem('ultra_cart', JSON.stringify(cart));
            updateCartBadge();
            
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function updateCartBadge() {
            const count = cart.length;
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartCount').style.display = count > 0 ? 'flex' : 'none';
        }

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.dock-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');

            if(id === 'cartView') renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            if(cart.length === 0) {
                list.innerHTML = '';
                document.getElementById('cartEmpty').style.display = 'block';
                return;
            }
            document.getElementById('cartEmpty').style.display = 'none';
            list.innerHTML = cart.map((p, i) => `
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px; background:var(--surface); padding:15px; border-radius:20px;">
                    <img src="${p.imgs[0]}" style="width:70px; height:70px; border-radius:15px; object-fit:cover;">
                    <div style="flex:1">
                        <h4 style="font-size:14px; margin-bottom:4px;">${p.name}</h4>
                        <b style="color:var(--accent);">${p.price.toFixed(2)} ₼</b>
                    </div>
                    <i class="fa-solid fa-trash-can" onclick="removeFromCart(${i})" style="color:#ff4444; padding:10px;"></i>
                </div>
            `).join('') + `
                <div style="margin-top:30px; padding-top:20px; border-top:1px solid #eee;">
                    <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:800; margin-bottom:25px;">
                        <span>Cəmi:</span>
                        <span>${cart.reduce((a,b)=>a+b.price,0).toFixed(2)} ₼</span>
                    </div>
                    <button class="btn-main" onclick="orderWhatsApp()" style="width:100%">Sifarişi Tamamla</button>
                </div>
            `;
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            localStorage.setItem('ultra_cart', JSON.stringify(cart));
            updateCartBadge();
            renderCart();
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const data = cat === 'Hamısı' ? store : store.filter(p => p.cat === cat);
            renderProducts(data);
        }

        function dynamicSearch() {
            const q = document.getElementById('mainSearch').value.toLowerCase();
            const filtered = store.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function directOrder(code, name) {
            const msg = `Salam SenLife! 👋\nMən bu premium məhsulu sifariş etmək istəyirəm:\n✨ ${name} (Kod: ${code})`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(msg)}`);
        }

        function orderWhatsApp() {
            const items = cart.map(p => `- ${p.name} (${p.code})`).join('\n');
            const msg = `Salam SenLife! ✨\nSəbətimdəki bu məhsulları sifariş etmək istəyirəm:\n\n${items}\n\nToplam: ${cart.reduce((a,b)=>a+b.price,0).toFixed(2)} ₼`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(msg)}`);
        }

        function shareP() {
            if (navigator.share) navigator.share({ title: 'SenLife', text: 'Bu məhsul çox möhtəşəmdir!', url: window.location.href });
        }

        init();
    </script>
</body>
</html>
