<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senlife | Professional Marketplace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #121212;
            --accent: #d4a373; 
            --bg: #fdfdfd;
            --white: #ffffff;
            --gray: #8e8e93;
            --light-gray: #f2f2f7;
            --radius: 16px;
            --shadow: 0 8px 24px rgba(0,0,0,0.06);
            --red-line: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--primary); padding-bottom: 90px; overflow-x: hidden; }

        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
            padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-top { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 12px; 
        }
        
        .logo-img { height: 45px; object-fit: contain; }
        
        .red-divider {
            width: 2px;
            height: 30px;
            background-color: var(--red-line);
            border-radius: 2px;
        }
        
        .search-area { padding: 0 16px; display: flex; gap: 10px; }
        .search-wrapper {
            flex: 1; background: var(--light-gray);
            border-radius: 12px; display: flex; align-items: center; padding: 10px 15px;
        }
        .search-wrapper input {
            border: none; background: none; outline: none; width: 100%; font-size: 14px; margin-left: 8px;
        }

        .view { display: none; animation: slideUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .cat-banner { 
            background: var(--primary); color: white; padding: 15px; 
            border-radius: 12px; margin: 20px 16px; text-align: center; font-size: 0.9rem; 
        }
        
        .cat-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 16px;
        }
        .cat-item { text-align: center; background: white; padding: 15px 5px; border-radius: 12px; box-shadow: var(--shadow); }
        .cat-item i { font-size: 24px; color: var(--accent); margin-bottom: 8px; }
        .cat-item p { font-size: 11px; font-weight: 500; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0 30px;
            border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-link { text-decoration: none; color: var(--gray); text-align: center; font-size: 11px; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img src="https://i.postimg.cc/5t87Yx8F/1774906530079.png" class="logo-img" alt="Senlife Main">
            <div class="red-divider"></div>
            <img src="https://i.postimg.cc/Rq5QVZxB/1774906294188.png" class="logo-img" alt="Senlife Alt">
        </div>
        <div class="search-area">
            <div class="search-wrapper">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Axtarış edin...">
            </div>
        </div>
    </header>

    <main id="app">
        <section id="catalog" class="view">
            <div class="cat-banner">
                Unikal əl işləri və Brend məhsullar
            </div>
            <div class="cat-grid">
                <div class="cat-item"><i class="fa-solid fa-gem"></i><p>Bujiteriya</p></div>
                <div class="cat-item"><i class="fa-solid fa-fire"></i><p>Şamlar</p></div>
                <div class="cat-item"><i class="fa-solid fa-box-open"></i><p>Şokolad</p></div>
                <div class="cat-item"><i class="fa-solid fa-shapes"></i><p>Gips</p></div>
                <div class="cat-item"><i class="fa-solid fa-mug-hot"></i><p>Keramika</p></div>
                <div class="cat-item"><i class="fa-solid fa-wind"></i><p>Ətirlər</p></div>
                <div class="cat-item"><i class="fa-solid fa-clock"></i><p>Saatlar</p></div>
                <div class="cat-item"><i class="fa-solid fa-palette"></i><p>Porterlər</p></div>
                <div class="cat-item"><i class="fa-solid fa-scissors"></i><p>Toxunma</p></div>
            </div>
        </section>

        </main>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link" onclick="switchTab('home', this)"><i class="fa-solid fa-house"></i><span>Əsas</span></a>
        <a href="javascript:void(0)" class="nav-link active" onclick="switchTab('catalog', this)"><i class="fa-solid fa-layer-group"></i><span>Kataloq</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="switchTab('cart', this)"><i class="fa-solid fa-cart-shopping"></i><span>Səbət</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="switchTab('contact', this)"><i class="fa-solid fa-comment-dots"></i><span>Əlaqə</span></a>
    </nav>

    <script>
        function switchTab(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
