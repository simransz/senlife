<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SenLife | Professional Marketplace</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #ff4d4d; /* Daha yumşaq qırmızı */
            --primary-soft: #fff1f1;
            --dark: #1a1a1a;
            --white: #ffffff;
            --light: #f8f9fa;
            --radius: 20px;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); color: var(--dark); padding-bottom: 100px; overflow-x: hidden; }

        /* Header Dəyişiklikləri */
        header {
            background: var(--white); /* Tam ağ fon */
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
        .logo-img { height: 35px; object-fit: contain; }
        .red-divider { width: 1.5px; height: 20px; background: var(--primary); opacity: 0.3; }

        .search-area { padding: 0 16px; display: flex; align-items: center; gap: 10px; }
        
        .nav-icon-btn { 
            background: var(--light); 
            border: none; 
            color: var(--dark); 
            width: 42px; 
            height: 42px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .search-wrapper {
            background: var(--light);
            border: 1px solid #eee;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            flex: 1;
            height: 42px;
        }
        .search-wrapper input { border: none; background: none; outline: none; width: 100%; padding-left: 10px; font-size: 14px; }

        /* Grid & Cards */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 16px; }
        .card { background: white; border-radius: 22px; border: 1px solid #f0f0f0; overflow: hidden; box-shadow: var(--shadow-soft); transition: 0.3s; }
        .card-img { width: 100%; height: 170px; object-fit: cover; cursor: pointer; }
        .card-body { padding: 12px; }
        .status-badge { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 6px; margin-bottom: 6px; display: inline-block; }
        .status-ready { background: #e8f5e9; color: #2e7d32; }
        .status-order { background: #fff3e0; color: #ef6c00; }
        .card-title { font-size: 13px; font-weight: 700; height: 36px; line-height: 1.4; margin-bottom: 8px; color: #333; }
        .card-price { color: var(--primary); font-weight: 800; font-size: 16px; margin-bottom: 12px; }
        
        .btn-group { display: flex; gap: 8px; }
        .order-btn { flex: 1; background: #25D366; color: white; border: none; padding: 10px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .cart-btn { width: 40px; background: var(--primary); color: white; border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid #eee; z-index: 2000; }
        .nav-link { text-decoration: none; color: #b0b0b0; text-align: center; font-size: 11px; font-weight: 600; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--primary); }

        /* Modal (Məhsul Detalı) */
        .product-modal { position: fixed; inset: 0; background: white; z-index: 3000; display: none; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; padding: 15px; display: flex; justify-content: space-between; background: white; z-index: 10; }
        .detail-swiper { width: 100%; height: 350px; }
        .detail-info { padding: 20px; }
        .detail-price { font-size: 24px; color: var(--primary); font-weight: 800; margin: 10px 0; }
        .detail-meta { background: var(--light); padding: 15px; border-radius: 15px; margin: 15px 0; }
        .meta-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .meta-label { color: #777; }
        .meta-value { font-weight: 700; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 25px; border-radius: 50px; z-index: 4000; display: none; font-size: 13px; }

        /* Banner Style */
        .hero-swiper { margin: 15px; height: 180px; border-radius: 20px; overflow: hidden; }
        .banner-slide { width: 100%; height: 100%; background-size: cover; background-position: center; }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

    <div id="toast">Səbətə əlavə edildi!</div>

    <div id="productModal" class="product-modal">
        <div class="modal-header">
            <button class="nav-icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <button class="nav-icon-btn" onclick="shareProduct()"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <div class="swiper detail-swiper">
            <div class="swiper-wrapper" id="modal-slides"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="detail-info">
            <h1 id="det-title" style="font-size: 22px;"></h1>
            <div id="det-price" class="detail-price"></div>
            
            <div class="detail-meta">
                <div class="meta-item"><span class="meta-label">Kod:</span> <span class="meta-value" id="det-code"></span></div>
                <div class="meta-item"><span class="meta-label">Kateqoriya:</span> <span class="meta-value" id="det-cat"></span></div>
                <div class="meta-item"><span class="meta-label">Status:</span> <span class="meta-value" id="det-status"></span></div>
            </div>

            <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom:8px;">Məhsul haqqında:</h4>
                <p id="det-desc" style="color: #666; line-height: 1.6; font-size: 14px;"></p>
            </div>

            <div class="btn-group" style="height: 55px;">
                <button id="det-order-btn" class="order-btn" style="font-size:16px;">WhatsApp ilə Sifariş</button>
                <button id="det-cart-btn" class="cart-btn" style="width:60px;"><i class="fa-solid fa-cart-plus"></i></button>
            </div>
        </div>
    </div>

    <header>
        <div class="header-top">
            <img src="https://i.postimg.cc/5t87Yx8F/1774906530079.png" class="logo-img" />
            <div class="red-divider"></div>
            <img src="https://i.postimg.cc/Rq5QVZxB/1774906294188.png" class="logo-img" />
        </div>
        <div class="search-area">
            <button class="nav-icon-btn" onclick="goHome()"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass" style="color:#ccc;"></i>
                <input type="text" id="searchInput" placeholder="Məhsul və ya kod axtar..." onkeyup="filterProducts()" />
            </div>
            <button class="nav-icon-btn" style="color: #ff9800;"><i class="fa-solid fa-star"></i></button>
        </div>
    </header>

    <main id="app">
        <section id="home" class="view active">
            <div class="swiper hero-swiper">
                <div class="swiper-wrapper" id="banner-wrapper"></div>
            </div>
            <h2 id="list-title" style="padding: 10px 16px; font-size: 18px; font-weight: 800;">Yeni Gələnlər</h2>
            <div class="products-grid" id="product-list"></div>
        </section>

        <section id="catalog" class="view">
            <h2 style="padding: 20px 16px; font-size: 20px;">Kateqoriyalar</h2>
            <div class="cat-grid" id="category-list" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px;"></div>
        </section>

        <section id="cart" class="view">
            <div style="padding: 20px;">
                <h2 style="margin-bottom:20px; color: var(--primary);">Səbətim</h2>
                <div id="cart-items"></div>
                <div id="cart-summary" style="margin-top:20px; background: var(--light); padding: 20px; border-radius: 20px; display:none;">
                    <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom: 15px;">
                        <span>Cəmi Məbləğ:</span> <span id="total-price">0 AZN</span>
                    </div>
                    <button onclick="orderCartWhatsApp()" class="order-btn" style="width:100%; padding:16px;">Sifarişi Tamamla</button>
                </div>
            </div>
        </section>

        <section id="contact" class="view">
            <div style="padding: 20px; text-align: center;">
                <div style="background: var(--primary); color: white; padding: 40px 20px; border-radius: 30px; margin-bottom: 20px;">
                    <h2 style="font-size: 28px;">SenLife</h2>
                    <p style="margin-top: 10px; opacity: 0.9;">Eksklüziv hədiyyələr dünyası</p>
                </div>
                <div style="display: grid; gap: 12px;">
                    <a href="https://wa.me/994773526665" class="order-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center; gap:10px; padding:18px;">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp Dəstək
                    </a>
                    <a href="https://www.instagram.com/senlife.az?igsh=eDU4d3N6ZjQ2aGJm" style="text-decoration:none; color:black; background:#f0f0f0; padding:18px; border-radius:15px; font-weight:700;">
                        <i class="fa-brands fa-instagram"></i> senlife.az
                    </a>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="showView('home', this)"><i class="fa-solid fa-house"></i><span>Əsas</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('catalog', this)"><i class="fa-solid fa-shapes"></i><span>Kataloq</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('cart', this)"><i class="fa-solid fa-basket-shopping"></i><span>Səbət</span></a>
        <a href="javascript:void(0)" class="nav-link" onclick="showView('contact', this)"><i class="fa-solid fa-circle-user"></i><span>Profil</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const products = [
            { id: 1, code: 'SN001', name: 'Gips Mini Qutusu', price: 12.00, cat: 'Gips məhsullar', img: ['https://picsum.photos/600/600?1', 'https://picsum.photos/600/600?11'], status: 'Hazırdır', desc: 'Əllə hazırlanmış, yüksək keyfiyyətli dekorativ gips qutu.' },
            { id: 2, code: 'SN002', name: 'Dekorativ Şam', price: 18.50, cat: 'Şamlar', img: ['https://picsum.photos/600/600?2', 'https://picsum.photos/600/600?22'], status: 'Sifarişlə', desc: 'Təbii soya mumundan hazırlanmış xoş ətirli şam.' }
        ];

        const categories = [
            { name: 'Şamlar', icon: 'fa-fire' },
            { name: 'Gips məhsullar', icon: 'fa-cube' },
            { name: 'Hədiyyəlik', icon: 'fa-gift' }
        ];

        let cart = [];
        let detailSwiper;

        function init() {
            renderProducts(products);
            renderCategories();
            renderBanners();
        }

        function renderProducts(data) {
            const list = document.getElementById('product-list');
            list.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.img[0]}" class="card-img" onclick="openProduct(${p.id})" />
                    <div class="card-body">
                        <span class="status-badge ${p.status === 'Hazırdır' ? 'status-ready' : 'status-order'}">${p.status}</span>
                        <div class="card-title" onclick="openProduct(${p.id})">${p.name}</div>
                        <div class="card-price">${p.price.toFixed(2)} AZN</div>
                        <div class="btn-group">
                            <button class="order-btn" onclick="orderSingle('${p.code}', '${p.name}')">Sifariş</button>
                            <button class="cart-btn" onclick="addToCart(${p.id})"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('det-title').innerText = p.name;
            document.getElementById('det-price').innerText = p.price.toFixed(2) + " AZN";
            document.getElementById('det-code').innerText = p.code;
            document.getElementById('det-cat').innerText = p.cat;
            document.getElementById('det-status').innerText = p.status;
            document.getElementById('det-desc').innerText = p.desc;
            
            document.getElementById('det-order-btn').onclick = () => orderSingle(p.code, p.name);
            document.getElementById('det-cart-btn').onclick = () => addToCart(p.id);

            const slides = p.img.map(img => `<div class="swiper-slide"><img src="${img}" style="width:100%; height:100%; object-fit:cover;"></div>`).join('');
            document.getElementById('modal-slides').innerHTML = slides;
            
            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';

            if (detailSwiper) detailSwiper.destroy();
            detailSwiper = new Swiper('.detail-swiper', {
                pagination: { el: '.swiper-pagination' },
                autoplay: { delay: 2500 },
                loop: p.img.length > 1
            });
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function orderSingle(code, name) {
            const text = `Salam, SenLife! 👋\n\nBu məhsulu sifariş vermək istəyirəm:\n✨ *Məhsul:* ${name}\n🔢 *Kod:* ${code}\n\nZəhmət olmasa məlumat verərdiniz.`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(text)}`);
        }

        function orderCartWhatsApp() {
            let itemsText = cart.map((p, i) => `${i+1}. ${p.name} (Kod: ${p.code}) - ${p.price} AZN`).join('\n');
            const total = cart.reduce((sum, p) => sum + p.price, 0).toFixed(2);
            const text = `Salam, SenLife! 👋\n\nSəbətimdəki məhsulları sifariş vermək istəyirəm:\n\n${itemsText}\n\n💰 *Cəmi:* ${total} AZN\n\nSifarişi təsdiqləmək üçün geri dönüşünüzü gözləyirəm.`;
            window.open(`https://wa.me/994773526665?text=${encodeURIComponent(text)}`);
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            showToast();
            updateCartUI();
        }

        function updateCartUI() {
            const cartDiv = document.getElementById('cart-items');
            if(cart.length === 0) {
                cartDiv.innerHTML = "<p style='text-align:center; color:#888; margin-top:50px;'>Səbətiniz boşdur.</p>";
                document.getElementById('cart-summary').style.display = 'none';
                return;
            }
            cartDiv.innerHTML = cart.map((p, i) => `
                <div style="display:flex; align-items:center; gap:15px; background:#f9f9f9; padding:10px; border-radius:15px; margin-bottom:10px;">
                    <img src="${p.img[0]}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
                    <div style="flex:1;">
                        <div style="font-weight:700; font-size:14px;">${p.name}</div>
                        <div style="color:var(--primary); font-weight:800;">${p.price} AZN</div>
                    </div>
                    <button onclick="removeFromCart(${i})" style="border:none; background:none; color:#ff4d4d; font-size:18px; padding:10px;"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
            document.getElementById('cart-summary').style.display = 'block';
            document.getElementById('total-price').innerText = cart.reduce((sum, p) => sum + p.price, 0).toFixed(2) + " AZN";
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'cart') updateCartUI();
            window.scrollTo(0,0);
        }

        function goHome() {
            document.getElementById('searchInput').value = '';
            renderProducts(products);
            showView('home', document.querySelector('.nav-link:first-child'));
        }

        function filterProducts() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(val) || p.code.toLowerCase().includes(val));
            renderProducts(filtered);
        }

        function renderCategories() {
            document.getElementById('category-list').innerHTML = categories.map(c => `
                <div class="cat-item" style="text-align:center; padding:15px; background:#fff; border-radius:18px; border:1px solid #f0f0f0;" onclick="filterByCat('${c.name}')">
                    <div style="width:45px; height:45px; background:var(--primary-soft); color:var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center; margin:0 auto 8px;"><i class="fa-solid ${c.icon}"></i></div>
                    <p style="font-size:10px; font-weight:700;">${c.name}</p>
                </div>
            `).join('');
        }

        function renderBanners() {
            const data = [{ img: "https://picsum.photos/800/400?10" }, { img: "https://picsum.photos/800/400?11" }];
            document.getElementById('banner-wrapper').innerHTML = data.map(b => `<div class="swiper-slide"><div class="banner-slide" style="background-image:url('${b.img}')"></div></div>`).join('');
            new Swiper('.hero-swiper', { loop: true, autoplay: { delay: 3000 } });
        }

        function filterByCat(cat) {
            const filtered = products.filter(p => p.cat === cat);
            renderProducts(filtered);
            document.getElementById('list-title').innerText = cat;
            showView('home', document.querySelector('.nav-link:first-child'));
        }

        init();
    </script>
</body>
</html>
